name: publish-update-feed-pages

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Channel to publish
        required: true
        default: stable
      run_tests:
        description: Run automated tests before packaging
        required: true
        default: "false"
      include_msix:
        description: Build and publish MSIX artifacts in addition to the portable update channel
        required: true
        default: "false"
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-stage:
    runs-on: windows-latest

    outputs:
      public_base_url: ${{ steps.update-base.outputs.public_base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Resolve update base URL
        id: update-base
        shell: pwsh
        run: |
          $defaultBaseUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/aegistune/${{ github.event.inputs.channel || 'stable' }}"
          $configuredBaseUrl = "${{ vars.UPDATE_PUBLIC_BASE_URL }}"
          if ([string]::IsNullOrWhiteSpace($configuredBaseUrl)) {
            $configuredBaseUrl = $defaultBaseUrl
          }
          "public_base_url=$configuredBaseUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        shell: pwsh
        run: dotnet restore .\AegisTune.sln -p:Platform=x64

      - name: Test
        id: tests
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests == 'true' }}
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts\TestResults -Force | Out-Null
          dotnet test .\AegisTune.sln `
            -p:Platform=x64 `
            --no-restore `
            --logger "trx;LogFileName=aegistune-tests.trx" `
            --results-directory .\artifacts\TestResults `
            --diag .\artifacts\TestResults\vstest-diag.log

      - name: Upload test diagnostics
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: pages-test-diagnostics
          path: .\artifacts\TestResults
          if-no-files-found: ignore

      - name: Fail build if tests failed
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests == 'true' }}
        shell: pwsh
        run: |
          if ('${{ steps.tests.outcome }}' -ne 'success') {
            throw 'dotnet test failed on the GitHub runner. Download the pages-test-diagnostics artifact from this run for the exact failing test.'
          }

      - name: Build portable
        shell: pwsh
        run: .\scripts\build-portable.ps1 -Platform x64 -Configuration Release

      - name: Build MSIX
        if: ${{ github.event_name == 'push' || github.event.inputs.include_msix == 'true' }}
        shell: pwsh
        run: .\scripts\build-msix.ps1 -Platform x64 -Configuration Release -KeepPackageCount 1

      - name: Stage Pages site
        shell: pwsh
        run: |
          $channel = "${{ github.event.inputs.channel || 'stable' }}"
          $stageArgs = @(
            '-Channel', $channel,
            '-ProductPath', 'aegistune',
            '-SiteRoot', '.\artifacts\pages-site',
            '-PublicBaseUrl', "${{ steps.update-base.outputs.public_base_url }}",
            '-CName', "${{ vars.UPDATE_CNAME }}"
          )

          if ('${{ github.event_name }}' -ne 'push' -and '${{ github.event.inputs.include_msix }}' -ne 'true') {
            $stageArgs += '-PortableOnly'
          }

          .\scripts\stage-update-feed-for-pages.ps1 @stageArgs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .\artifacts\pages-site

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-stage
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
